<!DOCTYPE html>
<html lang="en">
<head>
    <meta id="appViewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Sea Diary Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --app-main: #069494; 
            --app-main-hover: #057a7a;
            --bg-main: #f3f6f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;      
            --text-muted: #475569;     
            --border-color: rgba(0,0,0,0.08);
            --input-bg: #f8fafc;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.06);
            --picker-bg: #f1f5f9;
            --modal-bg: #ffffff;
        }

        html { overscroll-behavior: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding-bottom: 90px;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior: none; 
        }
        
        h1, h2, h3, h4, h5, h6, .live-score-value, .picker-item, .btn, .xc-score { font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; }

        .text-primary { color: var(--app-main) !important; }
        .bg-primary { background-color: var(--app-main) !important; }
        .btn-primary { background-color: var(--app-main) !important; border-color: var(--app-main) !important; color: #fff !important; font-weight: 700; border-radius: 12px;}
        .btn-outline-primary { color: var(--app-main) !important; border-color: var(--app-main) !important; border-radius: 12px; font-weight: 700;}
        
        .btn-danger, .btn-secondary, .btn-dark { border-radius: 12px; font-weight: 700; }

        .form-control, .form-select { 
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 12px; 
            padding: 12px 16px; 
            border: 1px solid var(--border-color); 
            font-weight: 600;
        }

        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px 15px 40px 15px; animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .inner-card { background: var(--card-bg); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--border-color); }

        .splash-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-main); z-index: 1040; 
        }
        
        .logo-svg { width: 160px; height: 160px; margin-bottom: 25px; }
        .sonar-sweep { transform-origin: 100px 100px; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .icon-spin { animation: spin 1s linear infinite; }

        .live-score-box { border: 3px solid var(--app-main); background-color: var(--card-bg); border-radius: 20px; padding: 10px 15px; text-align: center; margin-bottom: 16px; }
        .live-score-value { font-size: 2.8rem; font-weight: 800; color: var(--app-main); line-height: 1; letter-spacing: -1px; }

        .tide-chart-container { background: var(--card-bg); border-radius: 20px; padding: 25px 12px 10px 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); cursor: zoom-in; }
        
        .xc-shield { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 2px solid var(--app-main); border-radius: 20px; padding: 20px; text-align: center; color: white; margin-bottom: 16px; }
        .xc-score { font-size: 4rem; font-weight: 800; color: #ffffff; line-height: 1; }
    </style>
</head>
<body>

    <div class="toast-container position-fixed top-0 end-0 p-3 mt-4" style="z-index: 20000;">
        <div id="appToast" class="toast border-0 shadow-lg rounded-4" role="alert">
            <div class="d-flex"><div class="toast-body fw-bold fs-6" id="toastMsg"></div><button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <div id="splashScreen" class="splash-screen">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#069494" stroke-width="2"/>
            <g class="sonar-sweep"><path d="M 100,100 L 100,5 A 95 95 0 0 1 195,100 Z" fill="#08baba" opacity="0.5"/></g>
            <path d="M 160,95 L 120,80 L 60,95 L 40,80 L 40,110 L 60,95 L 120,110 Z" fill="#e2e8f0"/>
        </svg>

        <h1 class="display-3 fw-bold mb-0 text-center">Sea Diary</h1>
        <p class="text-uppercase text-muted fw-bold small mb-4">Version 2.0.4</p>
        
        <div class="d-grid gap-3 col-10 col-md-6 mx-auto w-100" style="max-width: 350px;">
            <button id="btnInstallApp" class="btn btn-warning btn-lg fw-bold py-3 shadow" style="display:none;" onclick="window.installApp()"><i class="bi bi-download me-2"></i>Install App</button>
            <button class="btn btn-primary btn-lg fw-bold py-3 shadow-sm" style="font-size: 1.2rem;" onclick="window.startFishing()">Start Session</button>
            <button class="btn btn-outline-primary btn-lg py-3 fw-bold bg-white" onclick="window.openHistory()">History</button>
        </div>
        
        <div class="mt-5 d-flex flex-column align-items-center gap-3">
            <button class="btn btn-link text-muted text-decoration-none small fw-bold p-0" data-bs-toggle="modal" data-bs-target="#guideModal"><i class="bi bi-book-fill me-1 text-primary"></i> User Guide</button>
            <button id="btnRefreshApp" class="btn btn-link text-muted text-decoration-none small fw-bold p-0" onclick="window.forceAppUpdate()"><i id="refreshIcon" class="bi bi-arrow-clockwise me-1 text-primary"></i> Check for Updates</button>
        </div>
    </div>

    <div id="anglerRegistration" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold m-0 text-primary">Session Setup</h3>
            <button class="btn btn-sm btn-outline-secondary px-4 py-2 rounded-pill fw-bold bg-white" onclick="window.resetAppToHome()">Back</button>
        </div>
        
        <div class="inner-card mb-3">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Angler</label>
                <input type="text" id="anglerName" class="form-control fw-bold">
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Venue</label>
                <div id="venueSelectContainer">
                    <select id="venueSelect" class="form-select fw-bold text-primary" onchange="window.handleVenueDropdown()">
                        </select>
                </div>
                <div id="venueInputContainer" style="display:none;" class="mt-2">
                    <div class="input-group shadow-sm mb-2">
                        <input type="text" id="venueInputText" class="form-control fw-bold" placeholder="Type new venue name...">
                        <button class="btn btn-outline-danger" onclick="window.cancelNewVenue()"><i class="bi bi-x-lg"></i></button>
                    </div>
                    <button id="btnAutoSearchNew" class="btn btn-outline-primary w-100 fw-bold py-2" onclick="window.linkNewVenueGPS()">
                        <i class="bi bi-geo-alt-fill me-1"></i> Scan for GPS Tides
                    </button>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-6"><label class="small fw-bold text-muted">Date</label><input type="date" id="competitionDate" class="form-control"></div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">Format</label>
                    <select id="scoringMethod" class="form-select fw-bold">
                        <option value="length_only">Length Only</option>
                        <option value="measure_points">Length + 10 Pts</option>
                        <option value="species_hunt">Species Hunt</option>
                        <option value="weight">Total Weight</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="inner-card mb-3" id="envPreview" style="display:none;">
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="text" id="weatherInput" class="form-control text-center fw-bold small" placeholder="Weather" readonly></div>
                <div class="col-6"><input type="text" id="windInput" class="form-control text-center fw-bold small" placeholder="Wind" readonly></div>
            </div>
            <div id="setupTideChartContainer" class="tide-chart-container" onclick="window.viewImg(document.getElementById('setupTideCanvas').toDataURL())">
                <canvas id="setupTideCanvas" class="w-100"></canvas>
            </div>
        </div>
        
        <button class="btn btn-primary btn-lg w-100 py-3 shadow-lg mt-2 fw-bold fs-4" onclick="window.registerAngler()">Start Fishing</button>
    </div>

    <div id="anglerFishingPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="m-0 fw-bold text-primary">Live Log</h4>
            <button class="btn btn-sm btn-outline-danger px-4 py-2 rounded-pill bg-white" onclick="window.confirmQuit()">Quit</button>
        </div>
        <div class="inner-card mb-3">
            <div class="mb-3">
                <select id="speciesInput" class="form-select fw-bold" onchange="window.toggleCustomSpeciesInput()"></select>
                <input type="text" id="customSpeciesInput" class="form-control fw-bold mt-2" placeholder="Species name..." style="display:none;">
            </div>
            <div id="lengthInputContainer" class="mb-3">
                <input type="number" id="fishLengthInput" class="form-control text-center fw-bold fs-4" placeholder="Length (cm)">
            </div>
            <button class="btn btn-primary w-100 py-3 fw-bold fs-5" onclick="window.addFishTextOnly()">Record Catch</button>
        </div>
        <div class="live-score-box mb-3"><div class="small text-muted fw-bold">Session Score</div><div class="live-score-value" id="liveScoreVal">0</div></div>
        <div id="fishLog" class="d-flex flex-column gap-2 mb-4"></div>
        <button class="btn btn-danger btn-lg w-100 py-3 fw-bold shadow" onclick="window.endSession()">Finish Session</button>
    </div>

    <div class="modal fade" id="savedModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content"><div class="modal-header border-0 pb-0 px-4 pt-4"><h4 class="modal-title fw-bold text-primary">Diary History</h4><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light"><div id="recentList" class="p-3"></div></div></div></div></div>

    <div id="nativeImageViewer" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#0f172a; z-index:99999; overflow:auto;"><div class="p-3 text-end"><button onclick="window.closeImgView()" class="btn btn-outline-light rounded-pill px-4 fw-bold">Close</button></div><div style="width:100%; height:80%; display:flex; align-items:center; justify-content:center;"><img id="nativeFullImage" src="" style="width: 100%; height: auto; max-height: 90vh; background: white; border-radius: 12px;"></div></div>

    <script>
        const WEATHER_API_KEY = "db7f2afb64d943719e0203116260103";
        const speciesList=[
            {category:"Common",items:["Cod","Pollack","Coalfish","Whiting","Dab","Flounder","Plaice","Turbot","Dogfish (LSD)"]},
            {category:"Round Fish",items:["Bass","Bream","Garfish","Mackerel","Mullet","Scad"]},
            {category:"Sharks & Rays",items:["Smoothhound","Spurdog","Tope","Ray (Thornback)"]}
        ];
        
        // Well-known Scottish Marks (Internal DB)
        const scottishMarks = [
            {name:"Aberdeen Breakwater",lat:57.1437,lon:-2.0776},
            {name:"Arbroath Cliffs",lat:56.5503,lon:-2.5802},
            {name:"St Andrews Pier",lat:56.34,lon:-2.79},
            {name:"Portpatrick Pier",lat:54.8333,lon:-5.1167},
            {name:"Greenock Quay",lat:55.9521,lon:-4.7644},
            {name:"Ayr Pier",lat:55.4586,lon:-4.6292},
            {name:"Scrabster Harbor",lat:58.6083,lon:-3.5416},
            {name:"Ullapool Pier",lat:57.8953,lon:-5.1585},
            {name:"Mallaig Pier",lat:57.0064,lon:-5.8291},
            {name:"Dunoon Pier",lat:55.946,lon:-4.921}
        ];
        
        let fishData=[], currentScoringMethod='', currentAngler='Chris McCreadie', currentVenue='', hwTime='', lwTime='';
        const PageManager={ show:function(id){ document.querySelectorAll('.app-page').forEach(p=>p.style.display='none'); document.getElementById('splashScreen').style.display='none'; document.getElementById(id).style.display='block'; window.scrollTo(0,0); } };
        const StorageHelper={ save:(k,v)=>localStorage.setItem(k,v), get:k=>localStorage.getItem(k), remove:k=>localStorage.removeItem(k), getAll:()=>({...localStorage}) };

        window.populateVenueDropdown = function() {
            let vMap = JSON.parse(StorageHelper.get('venueTideMap') || '{}');
            const sel = document.getElementById('venueSelect');
            sel.innerHTML = '<option value="" disabled selected>Select Venue...</option>';
            
            // Default Scottish Marks
            scottishMarks.forEach(m => { sel.innerHTML += `<option value="${m.lat},${m.lon}">${m.name}</option>`; });
            
            // Custom Saved Marks
            Object.keys(vMap).sort().forEach(vName => {
                const data = vMap[vName];
                sel.innerHTML += `<option value="${data.lat},${data.lon}">${vName}</option>`;
            });
            
            sel.innerHTML += '<option value="__NEW__" class="fw-bold text-success">➕ Add New Mark...</option>';
        };

        window.handleVenueDropdown = function() {
            const val = document.getElementById('venueSelect').value;
            if (val === '__NEW__') {
                document.getElementById('venueSelectContainer').style.display = 'none';
                document.getElementById('venueInputContainer').style.display = 'block';
                document.getElementById('venueInputText').focus();
            } else {
                window.fetchEnvironmentData(val);
            }
        };

        window.linkNewVenueGPS = function() {
            const name = document.getElementById('venueInputText').value.trim();
            if(!name) return window.showAppToast("Enter venue name first.", true);
            const btn = document.getElementById('btnAutoSearchNew');
            btn.innerHTML = '<i class="bi bi-hourglass-split icon-spin"></i> Scanning...';
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                let vMap = JSON.parse(StorageHelper.get('venueTideMap') || '{}');
                vMap[name] = { lat, lon };
                StorageHelper.save('venueTideMap', JSON.stringify(vMap));
                
                window.populateVenueDropdown();
                window.cancelNewVenue();
                window.showAppToast(`📍 ${name} saved and linked to GPS.`);
                window.fetchEnvironmentData(`${lat},${lon}`);
                btn.innerHTML = '<i class="bi bi-geo-alt-fill"></i> Scan for GPS Tides';
            }, () => { window.showAppToast("GPS Error.", true); btn.innerHTML = '<i class="bi bi-geo-alt-fill"></i> Scan for GPS Tides'; });
        };

        window.fetchEnvironmentData = async function(coords) {
            const [lat, lon] = coords.split(',');
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/marine.json?key=${WEATHER_API_KEY}&q=${lat},${lon}&tides=yes`);
                const d = await res.json();
                if(d.forecast) {
                    const c = d.forecast.forecastday[0].hour[new Date().getHours()];
                    document.getElementById('weatherInput').value = `${c.condition.text}, ${c.temp_c}°C`;
                    document.getElementById('windInput').value = `${c.wind_dir} ${c.wind_mph}mph`;
                    const ts = d.forecast.forecastday[0].day.tides[0].tide;
                    const hw = ts.find(t=>t.tide_type==='HIGH'); const lw = ts.find(t=>t.tide_type==='LOW');
                    if(hw) hwTime = hw.tide_time.split(' ')[1]; if(lw) lwTime = lw.tide_time.split(' ')[1];
                    document.getElementById('envPreview').style.display = 'block';
                    window.drawTideGraph('setupTideCanvas', hwTime, lwTime);
                    window.showAppToast("Live Data Active.");
                }
            } catch (e) { window.showAppToast("Network error.", true); }
        };

        window.drawTideGraph = function(canvasId, hwStr, lwStr) {
            const canvas = document.getElementById(canvasId); const ctx = canvas.getContext('2d');
            canvas.width = 340 * 3; canvas.height = 150 * 3; ctx.scale(3, 3);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 340, 150);
            ctx.beginPath(); ctx.strokeStyle = '#069494'; ctx.lineWidth = 3;
            for(let x=0; x<=340; x++) { let y = 75 - Math.cos((x/340)*Math.PI*2)*50; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.stroke();
        };

        window.startFishing = function() { 
            document.getElementById("anglerName").value = currentAngler;
            document.getElementById("competitionDate").value = new Date().toISOString().split('T')[0];
            window.populateVenueDropdown(); PageManager.show('anglerRegistration'); 
        };

        window.registerAngler = function() {
            currentAngler = document.getElementById('anglerName').value.trim();
            const sel = document.getElementById('venueSelect');
            currentVenue = sel.options[sel.selectedIndex].text;
            currentScoringMethod = document.getElementById('scoringMethod').value;
            window.populateSpeciesDropdown(); PageManager.show('anglerFishingPage');
        };

        window.populateSpeciesDropdown = function() {
            const e = document.getElementById('speciesInput'); e.innerHTML='<option disabled selected>Select Species...</option>';
            speciesList.forEach(g => { const grp = document.createElement('optgroup'); grp.label = g.category; g.items.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; grp.appendChild(o); }); e.appendChild(grp); });
            e.innerHTML += '<option value="Other">Other...</option>';
        };

        window.addFishTextOnly = function() {
            const sp = document.getElementById('speciesInput').value; if(!sp) return;
            const len = document.getElementById('fishLengthInput').value;
            fishData.push({ species: sp, display: len + 'cm', time: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) });
            window.updateFishLog();
        };

        window.updateFishLog = function() {
            const log = document.getElementById('fishLog'); log.innerHTML = '';
            [...fishData].reverse().forEach((f, i) => {
                log.innerHTML += `<div class="inner-card p-3 d-flex justify-content-between"><div><div class="fw-bold">${f.species} <small class="text-muted">${f.time}</small></div><div class="text-primary fw-bold">${f.display}</div></div></div>`;
            });
            document.getElementById('liveScoreVal').textContent = fishData.length;
        };

        window.openHistory = function() { window.loadSavedScorecards(); bootstrap.Modal.getOrCreateInstance(document.getElementById('savedModal')).show(); };
        window.loadSavedScorecards = function() {
            const list = document.getElementById('recentList'); list.innerHTML = '';
            const keys = Object.keys(StorageHelper.getAll()).filter(k=>k.startsWith('scorecard_')).sort().reverse();
            keys.forEach(k => {
                const d = JSON.parse(StorageHelper.get(k));
                list.innerHTML += `<div class="inner-card mb-2"><strong>${d.venue}</strong><br><small>${d.date}</small></div>`;
            });
            if(keys.length === 0) list.innerHTML = '<div class="text-center p-4">No sessions found.</div>';
        };

        window.cancelNewVenue = function() { document.getElementById('venueSelectContainer').style.display = 'block'; document.getElementById('venueInputContainer').style.display = 'none'; };
        window.resetAppToHome = function() { fishData = []; PageManager.show('splashScreen'); };
        window.forceAppUpdate = function() {
            document.getElementById('refreshIcon').classList.add('icon-spin');
            setTimeout(() => window.location.reload(), 1000);
        };

        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
            window.resetAppToHome();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
