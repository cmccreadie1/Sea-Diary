<!DOCTYPE html>
<html lang="en">
<head>
    <meta id="appViewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Sea Diary Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --app-main: #069494; 
            --app-main-hover: #057a7a;
            --bg-main: #f3f6f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;      
            --text-muted: #475569;     
            --border-color: rgba(0,0,0,0.08);
            --input-bg: #f8fafc;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.06);
        }

        html { overscroll-behavior: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding-bottom: 90px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        h1, h2, h3, h4, h5, h6, .live-score-value, .btn, .xc-score { font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; }

        .text-primary { color: var(--app-main) !important; }
        .bg-primary { background-color: var(--app-main) !important; }
        .btn-primary { background-color: var(--app-main) !important; border-color: var(--app-main) !important; color: #fff !important; font-weight: 800; border-radius: 14px;}
        
        /* High-Visibility Inputs and Table */
        .form-control, .form-select { 
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 14px; 
            padding: 16px 18px; 
            border: 2px solid var(--border-color); 
            font-weight: 700;
            font-size: 1.15rem; /* Larger for cold hands */
        }

        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; animation: fadeIn 0.3s ease-out; }
        .inner-card { background: var(--card-bg); border-radius: 24px; padding: 20px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--border-color); }

        .splash-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-main); z-index: 1040; 
        }
        
        .logo-svg { width: 160px; height: 160px; margin-bottom: 25px; }
        .sonar-sweep { transform-origin: 100px 100px; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .icon-spin { animation: spin 1s linear infinite; }

        .live-score-value { font-size: 3.5rem; font-weight: 900; color: var(--app-main); line-height: 1; letter-spacing: -2px; }

        /* Catch Log Table - High Visibility */
        .catch-row { background: var(--card-bg); padding: 18px; border-radius: 18px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; }
        .catch-species { font-size: 1.35rem; font-weight: 800; color: var(--text-main); }
        .catch-detail { font-size: 1.15rem; font-weight: 700; color: var(--app-main); }

        .tide-chart-container { background: var(--card-bg); border-radius: 24px; padding: 50px 12px 15px 12px; border: 2px solid var(--border-color); box-shadow: var(--shadow-sm); position: relative; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="appToast" class="toast-container position-fixed top-0 end-0 p-3 mt-4" style="z-index: 20000;">
        <div class="toast border-0 shadow-lg rounded-4" role="alert">
            <div class="d-flex"><div class="toast-body fw-bold fs-5" id="toastMsg"></div><button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <div id="splashScreen" class="splash-screen">
        <svg class="logo-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#069494" stroke-width="2"/>
            <g class="sonar-sweep"><path d="M 100,100 L 100,5 A 95 95 0 0 1 195,100 Z" fill="#08baba" opacity="0.5"/></g>
            <path d="M 160,95 L 120,80 L 60,95 L 40,80 L 40,110 L 60,95 L 120,110 Z" fill="#e2e8f0"/>
        </svg>
        <h1 class="display-3 fw-bold mb-0">Sea Diary</h1>
        <p class="text-uppercase text-muted fw-bold small mb-4">Version 2.0.7</p>
        
        <div class="d-grid gap-3 col-10 col-md-6 mx-auto w-100" style="max-width: 350px;">
            <button class="btn btn-primary btn-lg fw-bold py-3 shadow-sm" style="font-size: 1.3rem;" onclick="window.startFishing()">Start Session</button>
            <button class="btn btn-outline-primary btn-lg py-3 fw-bold bg-white" onclick="window.openHistory()">History</button>
        </div>
        <div class="mt-5"><button id="btnRefreshApp" class="btn btn-link text-muted fw-bold p-0" onclick="window.forceAppUpdate()"><i id="refreshIcon" class="bi bi-arrow-clockwise me-1"></i> Check Updates</button></div>
    </div>

    <div id="anglerRegistration" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0 text-primary">Session Setup</h2>
            <button class="btn btn-outline-secondary px-4 fw-bold bg-white" onclick="window.resetAppToHome()">Back</button>
        </div>
        
        <div class="inner-card">
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small uppercase">Angler</label>
                <input type="text" id="anglerName" class="form-control">
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small uppercase">Venue</label>
                <div id="venueSelectContainer">
                    <select id="venueSelect" class="form-select text-primary" onchange="window.handleVenueDropdown()"></select>
                </div>
                <div id="venueInputContainer" style="display:none;" class="mt-3">
                    <div class="input-group shadow-sm mb-3">
                        <input type="text" id="venueInputText" class="form-control" placeholder="New Venue Name...">
                        <button class="btn btn-outline-danger" onclick="window.cancelNewVenue()"><i class="bi bi-x-lg"></i></button>
                    </div>
                    <button id="btnFindTide" class="btn btn-primary w-100 py-3 fs-5" onclick="window.linkNewVenueGPS()">
                        <i class="bi bi-geo-alt-fill me-2"></i> Find Tide Data (GPS)
                    </button>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-6"><label class="fw-bold text-muted small">Date</label><input type="date" id="competitionDate" class="form-control"></div>
                <div class="col-6"><label class="fw-bold text-muted small">Format</label>
                    <select id="scoringMethod" class="form-select">
                        <option value="length_only">Length Only</option>
                        <option value="weight">Total Weight</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="inner-card" id="envPreview" style="display:none;">
            <div class="row g-2 mb-3 text-center">
                <div class="col-6"><input type="text" id="weatherInput" class="form-control text-center fw-bold py-3 bg-light" readonly></div>
                <div class="col-6"><input type="text" id="windInput" class="form-control text-center fw-bold py-3 bg-light" readonly></div>
            </div>
            <div class="row g-2 mb-4 text-center">
                <div class="col-6"><input type="text" id="waveInput" class="form-control text-primary fw-bold py-3 bg-light" readonly></div>
                <div class="col-6"><input type="text" id="swellInput" class="form-control text-primary fw-bold py-3 bg-light" readonly></div>
            </div>
            <div id="setupTideChartContainer" class="tide-chart-container">
                <canvas id="setupTideCanvas" class="w-100"></canvas>
            </div>
        </div>
        
        <button class="btn btn-primary btn-lg w-100 py-4 shadow-lg mt-3 fw-bold fs-3" onclick="window.registerAngler()">Start Fishing</button>
    </div>

    <div id="anglerFishingPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="m-0 fw-bold text-primary">Live Log</h3>
            <button class="btn btn-outline-danger px-4 fw-bold bg-white" onclick="window.confirmQuit()">Quit</button>
        </div>
        <div class="inner-card text-center">
            <select id="speciesInput" class="form-select fw-bold mb-3"></select>
            <input type="number" id="fishLengthInput" class="form-control text-center fw-bold fs-3 mb-3" placeholder="Length (cm)">
            <button class="btn btn-primary w-100 py-4 fw-bold fs-4" onclick="window.addFishTextOnly()">Record Catch</button>
        </div>
        <div class="live-score-box mb-3"><div class="small text-muted fw-bold">Session Points</div><div class="live-score-value" id="liveScoreVal">0</div></div>
        <div id="fishLog" class="d-flex flex-column gap-3 mb-4"></div>
        <button class="btn btn-danger btn-lg w-100 py-3 fw-bold shadow" onclick="window.endSession()">Finish Session</button>
    </div>

    <div class="modal fade" id="savedModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h4>Diary History</h4><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light"><div id="recentList" class="p-3"></div></div></div></div></div>

    <script>
        const WEATHER_API_KEY = "db7f2afb64d943719e0203116260103";
        const speciesList=[
            {category:"Common",items:["Cod","Pollack","Coalfish","Whiting","Dab","Flounder","Plaice","Turbot","Dogfish (LSD)"]},
            {category:"Round Fish",items:["Bass","Bream","Garfish","Mackerel","Mullet","Scad"]}
        ];
        
        const scottishMarks = [
            {name:"Aberdeen Breakwater",lat:57.1437,lon:-2.0776},
            {name:"Arbroath Cliffs",lat:56.5503,lon:-2.5802},
            {name:"Portpatrick Pier",lat:54.8333,lon:-5.1167},
            {name:"Greenock Quay",lat:55.9521,lon:-4.7644},
            {name:"Scrabster Harbor",lat:58.6083,lon:-3.5416},
            {name:"Ullapool Pier",lat:57.8953,lon:-5.1585},
            {name:"Dunoon Pier",lat:55.946,lon:-4.921}
        ];
        
        let fishData=[], currentScoringMethod='', currentAngler='Chris McCreadie', currentVenue='', hwTime='', lwTime='', currentStationName='Coastal Port';
        const PageManager={ show:id=>{ document.querySelectorAll('.app-page').forEach(p=>p.style.display='none'); document.getElementById('splashScreen').style.display='none'; document.getElementById(id).style.display='block'; window.scrollTo(0,0); } };
        const Storage={ save:(k,v)=>localStorage.setItem(k,v), get:k=>localStorage.getItem(k), remove:k=>localStorage.removeItem(k), getAll:()=>({...localStorage}) };

        window.populateVenueDropdown = function() {
            let vMap = JSON.parse(Storage.get('venueTideMap') || '{}');
            const sel = document.getElementById('venueSelect');
            sel.innerHTML = '<option value="" disabled selected>Select Venue...</option>';
            scottishMarks.forEach(m => { sel.innerHTML += `<option value="${m.lat},${m.lon}">${m.name}</option>`; });
            Object.keys(vMap).sort().forEach(vName => { const d = vMap[vName]; sel.innerHTML += `<option value="${d.lat},${d.lon}">${vName}</option>`; });
            sel.innerHTML += '<option value="__NEW__" class="fw-bold text-success">➕ Add New Mark...</option>';
        };

        window.handleVenueDropdown = function() {
            const val = document.getElementById('venueSelect').value;
            if (val === '__NEW__') {
                document.getElementById('venueSelectContainer').style.display = 'none';
                document.getElementById('venueInputContainer').style.display = 'block';
                document.getElementById('venueInputText').focus();
            } else {
                window.fetchEnvironmentData(val);
            }
        };

        window.linkNewVenueGPS = function() {
            const name = document.getElementById('venueInputText').value.trim();
            if(!name) return;
            const btn = document.getElementById('btnFindTide'); btn.disabled = true;
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                let vMap = JSON.parse(Storage.get('venueTideMap') || '{}');
                vMap[name] = { lat, lon }; Storage.save('venueTideMap', JSON.stringify(vMap));
                window.populateVenueDropdown(); window.cancelNewVenue();
                window.fetchEnvironmentData(`${lat},${lon}`);
                btn.disabled = false;
            }, () => { btn.disabled = false; window.showAppToast("GPS Error", true); });
        };

        window.fetchEnvironmentData = async function(coords) {
            const [lat, lon] = coords.split(',');
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/marine.json?key=${WEATHER_API_KEY}&q=${lat},${lon}&tides=yes`);
                const d = await res.json();
                if(d.forecast) {
                    const c = d.forecast.forecastday[0].hour[new Date().getHours()];
                    document.getElementById('weatherInput').value = `${c.condition.text}, ${c.temp_c}°C`;
                    document.getElementById('windInput').value = `${c.wind_dir} ${c.wind_mph}mph`;
                    document.getElementById('waveInput').value = `${c.sig_ht_mt || '--'}m Wave`;
                    document.getElementById('swellInput').value = `${c.swell_ht_mt || '--'}m Swell`;
                    
                    const ts = d.forecast.forecastday[0].day.tides[0].tide;
                    const hw = ts.find(t=>t.tide_type==='HIGH'); const lw = ts.find(t=>t.tide_type==='LOW');
                    if(hw) hwTime = hw.tide_time.split(' ')[1]; if(lw) lwTime = lw.tide_time.split(' ')[1];
                    
                    // SMART PORT LOGIC: Always use the Port Name provided by API, not local town
                    currentStationName = d.location.name || 'Coastal Port';
                    
                    document.getElementById('envPreview').style.display = 'block';
                    window.drawTideGraph('setupTideCanvas', hwTime, lwTime);
                    window.showAppToast(`📍 Syncing with Port of ${currentStationName}`);
                }
            } catch (e) { window.showAppToast("API Error", true); }
        };

        window.drawTideGraph = function(canvasId, hwStr, lwStr) {
            const canvas = document.getElementById(canvasId); const ctx = canvas.getContext('2d');
            canvas.width = 340 * 3; canvas.height = 180 * 3; ctx.scale(3, 3);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 340, 180);

            const hwM = parseInt(hwStr.split(':')[0])*60 + parseInt(hwStr.split(':')[1]);
            const lwM = parseInt(lwStr.split(':')[0])*60 + parseInt(lwStr.split(':')[1]);
            const now = new Date(); const nowM = now.getHours()*60 + now.getMinutes();

            // Heading - Large Visibility
            ctx.fillStyle = "#069494"; ctx.font = "bold 13px Outfit"; ctx.textAlign = "center";
            ctx.fillText(`Live Tides: Port of ${currentStationName}`, 170, 20);

            // Grid Lines & Hourly graduations
            ctx.setLineDash([]); ctx.lineWidth = 1; ctx.textAlign = "center";
            for(let i=0; i<=8; i++) {
                let x = (i/8)*340; let t = new Date(now.getTime() + i*3600000);
                let timeStr = t.getHours().toString().padStart(2,'0') + ":00";
                ctx.strokeStyle = "rgba(0,0,0,0.06)";
                ctx.beginPath(); ctx.moveTo(x, 35); ctx.lineTo(x, 155); ctx.stroke();
                ctx.fillStyle = "#475569"; ctx.font = "bold 10px Inter";
                ctx.fillText(timeStr, x, 170);
            }

            // Tide Curve
            ctx.beginPath(); ctx.strokeStyle = '#069494'; ctx.lineWidth = 5;
            for(let x=0; x<=340; x++) {
                let tM = nowM + (x/340)*480; 
                let phase = ((tM - hwM) / 745) * Math.PI * 2;
                let y = 95 - Math.cos(phase) * 50;
                if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                if(Math.abs(tM-hwM) < 2) { ctx.fillStyle="#069494"; ctx.font="800 12px Outfit"; ctx.fillText("HIGH " + hwStr, x, y-18); }
                if(Math.abs(tM-lwM) < 2) { ctx.fillStyle="#475569"; ctx.font="800 12px Outfit"; ctx.fillText("LOW " + lwStr, x, y+28); }
            } ctx.stroke();
            
            // "NOW" Live Marker
            const timeNowText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            ctx.beginPath(); ctx.strokeStyle = "#ef4444"; ctx.setLineDash([4, 3]); ctx.moveTo(0, 35); ctx.lineTo(0, 155); ctx.stroke();
            ctx.fillStyle="#ef4444"; ctx.font="800 11px Outfit"; ctx.textAlign = "left";
            ctx.fillText("NOW " + timeNowText, 6, 42);
        };

        window.startFishing = function() { 
            document.getElementById("anglerName").value = currentAngler;
            document.getElementById("competitionDate").value = new Date().toISOString().split('T')[0];
            window.populateVenueDropdown(); PageManager.show('anglerRegistration'); 
        };

        window.registerAngler = function() {
            currentAngler = document.getElementById('anglerName').value;
            const sel = document.getElementById('venueSelect');
            currentVenue = sel.options[sel.selectedIndex].text;
            currentScoringMethod = document.getElementById('scoringMethod').value;
            window.populateSpeciesDropdown(); PageManager.show('anglerFishingPage');
        };

        window.populateSpeciesDropdown = function() {
            const e = document.getElementById('speciesInput'); e.innerHTML='<option disabled selected>Pick Species...</option>';
            speciesList.forEach(g => { const grp = document.createElement('optgroup'); grp.label = g.category; g.items.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; grp.appendChild(o); }); e.appendChild(grp); });
        };

        window.addFishTextOnly = function() {
            const sp = document.getElementById('speciesInput').value; if(!sp) return;
            const len = document.getElementById('fishLengthInput').value;
            fishData.push({ species: sp, display: len + 'cm', time: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) });
            window.updateFishLog();
        };

        window.updateFishLog = function() {
            const log = document.getElementById('fishLog'); log.innerHTML = '';
            [...fishData].reverse().forEach((f) => {
                log.innerHTML += `<div class="catch-row"><div><div class="catch-species">${f.species}</div><div class="catch-detail">${f.display}</div></div><div class="text-muted fw-bold">${f.time}</div></div>`;
            });
            document.getElementById('liveScoreVal').textContent = fishData.length;
        };

        window.openHistory = function() { window.loadSavedScorecards(); bootstrap.Modal.getOrCreateInstance(document.getElementById('savedModal')).show(); };
        window.loadSavedScorecards = function() {
            const list = document.getElementById('recentList'); list.innerHTML = '';
            const keys = Object.keys(Storage.getAll()).filter(k=>k.startsWith('scorecard_')).sort().reverse();
            keys.forEach(k => {
                const d = JSON.parse(Storage.get(k));
                list.innerHTML += `<div class="inner-card mb-2 fw-bold">${d.venue} - ${d.date}</div>`;
            });
        };

        window.cancelNewVenue = function() { document.getElementById('venueSelectContainer').style.display = 'block'; document.getElementById('venueInputContainer').style.display = 'none'; };
        window.resetAppToHome = function() { fishData = []; PageManager.show('splashScreen'); };
        window.forceAppUpdate = function() { document.getElementById('refreshIcon').classList.add('icon-spin'); setTimeout(() => window.location.reload(), 1000); };
        window.showAppToast = function(msg, isError = false) {
            const t = document.getElementById('toastMsg'); t.textContent = msg;
            new bootstrap.Toast(document.getElementById('appToast')).show();
        };

        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
            window.resetAppToHome();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
