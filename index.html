<!DOCTYPE html>
<html lang="en">
<head>
    <meta id="appViewport" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta charset="UTF-8">
    <title>Sea Diary Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --app-main: #069494; 
            --app-main-hover: #057a7a;
            --bg-main: #f3f6f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;      
            --text-muted: #475569;     
            --border-color: rgba(0,0,0,0.08);
            --input-bg: #f8fafc;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.06);
            --picker-bg: #f1f5f9;
            --modal-bg: #ffffff;
        }

        html { overscroll-behavior: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding-bottom: 90px;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior: none; 
        }
        
        h1, h2, h3, h4, h5, h6, .live-score-value, .picker-item, .btn, .xc-score { font-family: 'Outfit', sans-serif; letter-spacing: -0.5px; }

        .text-primary { color: var(--app-main) !important; }
        .bg-primary { background-color: var(--app-main) !important; }
        .btn-primary { background-color: var(--app-main) !important; border-color: var(--app-main) !important; color: #fff !important; font-weight: 700; border-radius: 12px;}
        .btn-primary:hover { background-color: var(--app-main-hover) !important; }
        .btn-outline-primary { color: var(--app-main) !important; border-color: var(--app-main) !important; border-radius: 12px; font-weight: 700;}
        .btn-outline-primary:hover, .btn-check:checked + .btn-outline-primary { background-color: var(--app-main) !important; color: #fff !important; }
        
        .btn-danger, .btn-secondary, .btn-dark { border-radius: 12px; font-weight: 700; }

        .form-control, .form-select { 
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 12px; 
            padding: 12px 16px; 
            border: 1px solid var(--border-color); 
            font-weight: 600;
        }

        .picker-outer-wrapper { background: var(--card-bg); padding: 12px; border-radius: 20px; border: 2px solid var(--app-main); margin-bottom: 12px; box-shadow: var(--shadow-sm); }
        .weight-picker-container { display: flex; justify-content: center; align-items: center; background: var(--picker-bg); border-radius: 12px; height: 140px; position: relative; overflow: hidden; border: 1px solid var(--border-color); }
        .picker-column { flex: 1; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; text-align: center; scrollbar-width: none; z-index: 2; overscroll-behavior-y: contain; }
        .picker-column::-webkit-scrollbar { display: none; }
        .picker-item { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 600; color: #94a3b8; opacity: 0.5; scroll-snap-align: center; transition: all 0.2s ease; }
        .picker-item.selected { color: var(--app-main); font-size: 2.2rem; font-weight: 800; opacity: 1; }
        .picker-highlight { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; height: 54px; background: rgba(6, 148, 148, 0.08); border-top: 2px solid var(--app-main); border-bottom: 2px solid var(--app-main); pointer-events: none; z-index: 1; border-radius: 12px; }
        .picker-label-text { font-size: 0.8rem; font-weight: 900; color: var(--app-main); position: absolute; bottom: 8px; text-transform: uppercase; }

        .app-page { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px 15px 40px 15px; animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .inner-card { background: var(--card-bg); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--border-color); }

        .splash-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: var(--bg-main); color: var(--text-main);
            text-align: center; padding: 20px; box-sizing: border-box;
            z-index: 1040; 
        }
        
        .logo-svg { width: 160px; height: 160px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); margin-bottom: 25px; }
        .sonar-sweep { transform-origin: 100px 100px; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .icon-spin { animation: spin 1s linear infinite; }

        .live-score-box { border: 3px solid var(--app-main); background-color: var(--card-bg); border-radius: 20px; padding: 10px 15px; text-align: center; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
        .live-score-value { font-size: 2.8rem; font-weight: 800; color: var(--app-main); line-height: 1; letter-spacing: -1px; }

        .fish-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 14px; flex-shrink: 0; border: 2px solid var(--border-color); box-shadow: var(--shadow-sm); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card-bg); padding: 14px 5px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); }
        .stat-card small { display: block; color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; letter-spacing: 0.5px; }
        .stat-card strong { font-size: 1.5rem; color: #0f172a; font-weight: 800; }
        
        .tide-chart-container { background: var(--card-bg); border-radius: 20px; padding: 25px 12px 10px 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); cursor: zoom-in; position: relative; }
        
        .xc-shield { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 2px solid var(--app-main); border-radius: 20px; padding: 20px; text-align: center; color: white; box-shadow: var(--shadow-md); margin-bottom: 16px; }
        .xc-score { font-size: 4rem; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        .xc-story { font-size: 0.95rem; color: #f8fafc; font-weight: 500; line-height: 1.4; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: left;}
        
    </style>
</head>
<body>

    <div class="toast-container position-fixed top-0 end-0 p-3 mt-4" style="z-index: 20000;">
        <div id="appToast" class="toast border-0 shadow-lg rounded-4" role="alert">
            <div class="d-flex"><div class="toast-body fw-bold fs-6 text-dark" id="toastMsg"></div><button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div>
        </div>
    </div>

    <div id="splashScreen" class="splash-screen">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#069494" stroke-width="2"/>
            <circle cx="100" cy="100" r="60" fill="none" stroke="#069494" stroke-width="1" opacity="0.3"/>
            <circle cx="100" cy="100" r="30" fill="none" stroke="#069494" stroke-width="1" opacity="0.3"/>
            <line x1="5" y1="100" x2="195" y2="100" stroke="#069494" stroke-width="1" opacity="0.3"/>
            <line x1="100" y1="5" x2="100" y2="195" stroke="#069494" stroke-width="1" opacity="0.3"/>
            <path d="M 160,95 L 120,80 L 60,95 L 40,80 L 40,110 L 60,95 L 120,110 Z" fill="#e2e8f0"/>
            <g class="sonar-sweep"><path d="M 100,100 L 100,5 A 95 95 0 0 1 195,100 Z" fill="#08baba" opacity="0.5"/></g>
        </svg>

        <h1 class="display-3 fw-bold mb-0 text-center" style="letter-spacing: -2px;">Sea Diary</h1>
        <p class="text-uppercase text-muted fw-bold small mb-4" style="letter-spacing: 3px;">Version 2.0.1</p>
        
        <div class="d-grid gap-3 col-10 col-md-6 mx-auto w-100" style="max-width: 350px;">
            <button id="btnInstallApp" class="btn btn-warning btn-lg fw-bold py-3 shadow" style="display:none; color: #0f172a;" onclick="window.installApp()">
                <i class="bi bi-download me-2"></i>Install App
            </button>
            <button class="btn btn-primary btn-lg fw-bold py-3 shadow-sm" style="font-size: 1.2rem;" onclick="window.startFishing()">Start Session</button>
            <button class="btn btn-outline-primary btn-lg py-3 fw-bold bg-white" onclick="window.openHistory()">History</button>
        </div>
        
        <div class="mt-5 d-flex flex-column align-items-center gap-3">
            <button class="btn btn-link text-muted text-decoration-none small fw-bold p-0" data-bs-toggle="modal" data-bs-target="#guideModal"><i class="bi bi-book-fill me-1 text-primary"></i> User Guide</button>
            <button id="btnRefreshApp" class="btn btn-link text-muted text-decoration-none small fw-bold p-0" onclick="window.forceAppUpdate()"><i id="refreshIcon" class="bi bi-arrow-clockwise me-1 text-primary"></i> Check for Updates</button>
        </div>
    </div>

    <div id="anglerRegistration" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold m-0 text-primary">Session Setup</h3>
            <button class="btn btn-sm btn-outline-secondary px-4 py-2 rounded-pill fw-bold bg-white" onclick="window.resetAppToHome()"><i class="bi bi-arrow-left me-1"></i>Back</button>
        </div>
        
        <div class="inner-card mb-3">
            <h5 class="fw-bold text-primary mb-3"><i class="bi bi-card-text me-2"></i>Session Details</h5>
            <div class="mb-3">
                <label class="form-label small mb-1 fw-bold text-muted">Angler Name</label>
                <input type="text" id="anglerName" class="form-control fw-bold" oninput="window.saveActiveSession()">
            </div>
            
            <div class="mb-3">
                <label class="form-label small mb-1 fw-bold text-muted">Venue</label>
                <div id="venueSelectContainer">
                    <select id="venueSelect" class="form-select fw-bold text-primary" onchange="window.handleVenueDropdown()">
                        <option value="" disabled selected>Tap to select saved venue...</option>
                    </select>
                </div>
                <div id="venueInputContainer" style="display:none;" class="input-group shadow-sm">
                    <input type="text" id="venueInputText" class="form-control fw-bold text-primary" placeholder="Type new venue name..." oninput="window.saveActiveSession()">
                    <button class="btn btn-outline-danger px-3" onclick="window.cancelNewVenue()"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6"><label class="small fw-bold text-muted">Date</label><input type="date" id="competitionDate" class="form-control" onchange="window.saveActiveSession()"></div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">Scoring Format</label>
                    <select id="scoringMethod" class="form-select fw-bold" onchange="window.handleMethodChange()">
                        <option value="length_only">Total Length Only</option>
                        <option value="measure_points">Length + 10 Pts</option>
                        <option value="species_hunt">Species Hunt</option>
                        <option value="weight">Total Weight</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="inner-card mb-3">
            <h5 class="fw-bold text-primary mb-3"><i class="bi bi-cloud-sun me-2"></i>Live Weather & Tides</h5>
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-outline-primary w-25" onclick="window.autoLocateStation()" id="btnAutoLocate"><i class="bi bi-geo-alt-fill fs-5"></i></button>
                <select id="tideStationSelect" class="form-select fw-bold" onchange="window.saveActiveSession()"></select>
            </div>
            <button class="btn btn-primary btn-lg w-100 fw-bold mb-4" onclick="window.fetchEnvironmentData()" id="btnFetchEnv"><i class="bi bi-cloud-download me-2"></i> Fetch Live Data</button>
            
            <div class="row g-2 mb-2">
                <div class="col-6"><input type="text" id="weatherInput" class="form-control text-center fw-bold" placeholder="Weather" readonly></div>
                <div class="col-6"><input type="text" id="windInput" class="form-control text-center fw-bold" placeholder="Wind" readonly></div>
                <div class="col-6"><input type="text" id="waveInput" class="form-control text-center fw-bold" placeholder="Wave" readonly></div>
                <div class="col-6"><input type="text" id="swellInput" class="form-control text-center fw-bold" placeholder="Swell" readonly></div>
            </div>

            <div class="text-center mt-3 pt-1 border-top border-opacity-10">
                <a href="#" class="small fw-bold text-muted text-decoration-none" onclick="document.getElementById('manualTideContainer').style.display='block'; this.style.display='none'; return false;">Enter Tides Manually</a>
            </div>

            <div id="manualTideContainer" class="mt-3 text-center" style="display:none;">
                 <div class="row g-2">
                     <div class="col-6"><label class="small text-muted fw-bold">High Water</label><input type="time" id="manHW" class="form-control text-center fw-bold" onchange="window.setManualTide()"></div>
                     <div class="col-6"><label class="small text-muted fw-bold">Low Water</label><input type="time" id="manLW" class="form-control text-center fw-bold" onchange="window.setManualTide()"></div>
                 </div>
            </div>

            <div class="tide-chart-container mt-4" id="setupTideChartContainer" style="display:none;" onclick="window.viewImg(document.getElementById('setupTideCanvas').toDataURL(), true)">
                <canvas id="setupTideCanvas" class="w-100"></canvas>
            </div>
        </div>
        
        <button class="btn btn-primary btn-lg w-100 py-3 shadow-lg mt-2 fw-bold fs-4" onclick="window.registerAngler()">Start Fishing</button>
    </div>

    <div id="anglerFishingPage" class="app-page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="m-0 fw-bold text-primary">Live Log</h4>
            <button class="btn btn-sm btn-outline-danger px-4 py-2 rounded-pill fw-bold bg-white" onclick="window.confirmQuit()">Quit</button>
        </div>

        <div class="tide-chart-container mb-3" id="liveTideChartContainer" style="display:none;" onclick="window.viewImg(document.getElementById('liveTideCanvas').toDataURL(), true)">
            <canvas id="liveTideCanvas" class="w-100"></canvas>
        </div>
        
        <div class="inner-card mb-3">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="window.handleCameraInput()">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted mb-1">Species</label>
                <select id="speciesInput" class="form-select fw-bold" onchange="window.toggleCustomSpeciesInput()"></select>
                <input type="text" id="customSpeciesInput" class="form-control fw-bold mt-2" placeholder="Type Species Name" style="display:none;">
            </div>
            <div id="lengthInputContainer" class="mb-3" style="display:none;">
                <label class="form-label small fw-bold text-muted mb-1">Fish Length</label>
                <div class="input-group shadow-sm">
                    <input type="number" id="fishLengthInput" class="form-control text-center fw-bold text-primary border-end-0 py-2" inputmode="decimal" style="font-size: 1.4rem;" placeholder="0">
                    <span class="input-group-text bg-white border-start-0 fw-bold">cm</span>
                </div>
            </div>
            <div id="weightPickerContainer" class="mb-3" style="display:none;">
                <div class="picker-outer-wrapper mb-0">
                    <div class="weight-picker-container"><div class="picker-highlight"></div><div id="pickerCol1" class="picker-column" onscroll="window.updatePickerDisplay('pickerCol1')"></div><div id="pickerCol2" class="picker-column" onscroll="window.updatePickerDisplay('pickerCol2')"></div><div class="picker-label-text" style="left: 20%;">KG</div><div class="picker-label-text" style="right: 20%;">G</div></div>
                </div>
            </div>
            <div class="row g-2 pt-1">
                <div class="col-6"><button class="btn btn-primary btn-record-action w-100" onclick="window.addFishTextOnly()"><i class="bi bi-check-circle fs-4 mb-1"></i>Record</button></div>
                <div class="col-6"><button class="btn btn-primary btn-record-action w-100" onclick="window.triggerCamera()"><i class="bi bi-camera-fill fs-4 mb-1"></i>Photo</button></div>
            </div>
        </div>

        <div class="live-score-box mb-3"><div class="small text-muted fw-bold">Session Total</div><div class="live-score-value" id="liveScoreVal">0</div></div>
        <div id="fishLog" class="d-flex flex-column gap-2 mb-4"></div>
        <button class="btn btn-danger btn-lg w-100 py-3 fw-bold fs-5 shadow" onclick="window.endSession()">Finish Session</button>
    </div>

    <div id="tallyVerificationPage" class="app-page">
        <div id="session_xc_shield" class="xc-shield" style="display:none;"></div>
        <div class="inner-card p-3 mb-3 border-0 shadow-sm">
            <h4 class="text-primary fw-bold m-0" id="session_angler"></h4>
            <div class="fw-bold text-main fs-5 mb-2" id="session_venue"></div>
        </div>
        <div class="live-score-box mb-3"><div class="small text-muted fw-bold">Final Score</div><div id="session_total_points" class="live-score-value">0</div></div>
        <div class="stat-grid mb-3">
            <div class="stat-card"><strong>Fish</strong><div id="session_total_fish" class="fw-bold fs-3">0</div></div>
            <div class="stat-card"><strong>Species</strong><div id="session_species_count" class="fw-bold fs-3">0</div></div>
            <div class="stat-card"><strong id="session_stat_label">Stat</strong><div id="session_total_stat" class="fw-bold fs-3">0</div></div>
        </div>
        <div id="session_visual_analytics"></div>
        <div id="session_breakdown_area"></div>
        <div class="d-grid gap-3 mt-4">
            <button class="btn btn-success py-3 shadow text-white fw-bold fs-5 rounded-4" style="background:#25D366; border: none;" onclick="window.shareAsImage('live')">Share Summary</button>
            <button class="btn btn-dark py-3 fw-bold shadow-sm rounded-4" onclick="window.resetAppToHome()">Home</button>
        </div>
    </div>

    <div class="modal fade" id="savedModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content"><div class="modal-header border-0 pb-0 pt-4 px-4"><h4 class="modal-title fw-bold text-primary">Diary History</h4><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light px-4 pb-4 pt-3"><div id="recentList"></div><div id="fullScorecardView" style="display:none;"></div></div></div></div></div>
    <div class="modal fade" id="guideModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-4"><h4>User Guide</h4><p>Version 2.0.1 - Animated feedback added.</p></div></div></div>
    <div class="modal fade" id="weightUnitModal" tabindex="-1" data-bs-backdrop="static"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-5 text-center"><h3 class="text-primary fw-bold mb-4">Unit</h3><div class="d-grid gap-3"><button class="btn btn-primary py-3 fw-bold" data-bs-dismiss="modal" onclick="window.handleUnitChoice('metric')">Kilograms</button><button class="btn btn-outline-primary py-3 fw-bold" data-bs-dismiss="modal" onclick="window.handleUnitChoice('imperial')">Pounds</button></div></div></div></div>

    <div id="nativeImageViewer" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#0f172a; z-index:99999; overflow:auto;"><div class="p-3 text-end"><button onclick="window.closeImgView()" class="btn btn-outline-light rounded-pill px-4 fw-bold shadow">Close</button></div><div style="width:100%; height:80%; display:flex; align-items:center; justify-content:center;"><img id="nativeFullImage" src="" style="width: 100%; height: auto; max-height: 90vh; object-fit: contain; border-radius: 12px; background: white;"></div></div>

    <script>
        const WEATHER_API_KEY = "db7f2afb64d943719e0203116260103";
        const speciesList=[
            {category:"Common",items:["Cod","Pollack","Coalfish","Whiting","Dab","Flounder","Plaice","Turbot","Dogfish (LSD)","Bull Huss"]},
            {category:"Round Fish",items:["Bass","Bream (Black)","Bream (Gilthead)","Bream (Red)","Garfish","Gurnard (Grey)","Gurnard (Red)","Gurnard (Tub)","Mackerel","Mullet (Golden)","Mullet (Grey/Thick)","Mullet (Red)","Scad","Weever (Lesser)"]},
            {category:"Flatfish",items:["Brill","Megrim","Sole (Dover)","Sole (Lemon)","Topknot"]},
            {category:"Sharks & Rays",items:["Dogfish (Blackmouth)","Smoothhound (Common)","Smoothhound (Starry)","Spurdog","Tope","Ray (Thornback)","Ray (Spotted)","Ray (Blonde)","Ray (Small-eyed)","Ray (Stingray)"]},
            {category:"Wrasse & Mini",items:["Wrasse (Ballan)","Wrasse (Corkwing)","Wrasse (Cuckoo)","Wrasse (Goldsinny)","Rockling (3-Bearded)","Rockling (Shore)","Blenny (Common)","Goby (Rock)","Poor Cod","Pouting (Bib)","Scorpion Fish","Squid"]}
        ];
        const tideStations = [];
        let fishData=[], currentScoringMethod='', selectedWeightUnit='metric', currentSavedKey='', currentAngler='', currentVenue='', hwTime='', lwTime='', weatherInfo='', windInfo='';
        const PageManager={ show:function(id){ document.querySelectorAll('.app-page').forEach(p=>p.style.display='none'); document.getElementById('splashScreen').style.display='none'; document.getElementById(id).style.display='block'; window.scrollTo(0,0); } };
        const StorageHelper={ save: function(k,v) { try { localStorage.setItem(k,v); } catch(e) { console.error("Storage full", e); } }, get: (k) => localStorage.getItem(k), remove: (k) => localStorage.removeItem(k), getAll: () => ({...localStorage}) };

        window.showAppToast = function(msg, isError = false) {
            const t = document.getElementById('appToast');
            document.getElementById('toastMsg').innerHTML = isError ? `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${msg}` : `<i class="bi bi-check-circle-fill me-2 text-success"></i> ${msg}`;
            t.className = isError ? 'toast text-bg-warning border-0 shadow-lg rounded-4' : 'toast bg-white text-dark border border-success border-opacity-25 shadow-lg rounded-4';
            new bootstrap.Toast(t).show();
        };

        window.openHistory = function() { window.loadSavedScorecards(); bootstrap.Modal.getOrCreateInstance(document.getElementById('savedModal')).show(); };

        window.populateSpeciesDropdown = function() { 
            const e = document.getElementById('speciesInput'); 
            e.innerHTML='<option value="" selected disabled>Select Fish...</option><option value="Other">Other (Manual Entry)</option>'; 
            speciesList.forEach(g => { const grp = document.createElement('optgroup'); grp.label = g.category; g.items.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; grp.appendChild(o); }); e.appendChild(grp); }); 
        };

        window.toggleCustomSpeciesInput = function() {
            document.getElementById("customSpeciesInput").style.display = document.getElementById("speciesInput").value === "Other" ? "block" : "none";
        };

        window.populateVenueDropdown = function() {
            let vMap = JSON.parse(StorageHelper.get('venueTideMap') || '{}');
            const sel = document.getElementById('venueSelect');
            sel.innerHTML = '<option value="" disabled selected>Tap to select saved venue...</option>';
            Object.keys(vMap).sort().forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            sel.innerHTML += '<option value="__NEW__" class="fw-bold text-success">➕ Create New Venue...</option>';
        };

        window.handleVenueDropdown = function() {
            if (document.getElementById('venueSelect').value === '__NEW__') {
                document.getElementById('venueSelectContainer').style.display = 'none';
                document.getElementById('venueInputContainer').style.display = 'flex';
                document.getElementById('venueInputText').value = ''; document.getElementById('venueInputText').focus();
            }
        };

        window.cancelNewVenue = function() {
            document.getElementById('venueSelectContainer').style.display = 'block';
            document.getElementById('venueInputContainer').style.display = 'none';
            document.getElementById('venueSelect').selectedIndex = 0;
        };

        window.populateTideStations = function() {
            const select = document.getElementById('tideStationSelect');
            if(!select) return;
            select.innerHTML = '<option value="" selected disabled>Manual Search...</option>';
            tideStations.forEach(regionObj => { const grp = document.createElement('optgroup'); grp.label = regionObj.region; regionObj.stations.forEach(station => { const opt = document.createElement('option'); opt.value = `${station.lat},${station.lon}`; opt.textContent = station.name; grp.appendChild(opt); }); select.appendChild(grp); });
        };

        window.autoLocateStation = function() {
            const btn = document.getElementById('btnAutoLocate');
            if (!navigator.geolocation) return window.showAppToast("GPS not supported.", true);
            const originalIcon = btn.innerHTML; btn.innerHTML = '<i class="bi bi-hourglass-split icon-spin"></i>'; btn.disabled = true;
            navigator.geolocation.getCurrentPosition((pos) => {
                window.showAppToast(`📍 Lat: ${pos.coords.latitude.toFixed(2)}, Lon: ${pos.coords.longitude.toFixed(2)} detected.`); 
                btn.innerHTML = originalIcon; btn.disabled = false;
            }, (err) => { btn.innerHTML = originalIcon; btn.disabled = false; }, { timeout: 10000 });
        };

        window.fetchEnvironmentData = async function() {
            const btn = document.getElementById('btnFetchEnv'); const val = document.getElementById('tideStationSelect').value;
            if (!navigator.onLine || !val) return window.showAppToast("Internet required.", true);
            const [lat, lon] = val.split(',');
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/marine.json?key=${WEATHER_API_KEY}&q=${lat},${lon}&tides=yes`);
                const d = await res.json();
                if(d.forecast) {
                    const c = d.forecast.forecastday[0].hour[new Date().getHours()];
                    document.getElementById('weatherInput').value = `${c.condition.text}, ${c.temp_c}°C`;
                    document.getElementById('windInput').value = `${c.wind_dir} ${c.wind_mph}mph`;
                    const ts = d.forecast.forecastday[0].day.tides[0].tide;
                    const hw = ts.find(t=>t.tide_type==='HIGH'); const lw = ts.find(t=>t.tide_type==='LOW');
                    if(hw) hwTime = hw.tide_time.split(' ')[1]; if(lw) lwTime = lw.tide_time.split(' ')[1];
                    if(hwTime && lwTime) { document.getElementById('setupTideChartContainer').style.display = 'block'; window.drawTideGraph('setupTideCanvas', hwTime, lwTime, [], ''); }
                    window.showAppToast("Data Fetched!");
                }
            } catch (err) { window.showAppToast("API Error", true); }
        };

        window.setManualTide = function() {
            hwTime = document.getElementById('manHW').value; lwTime = document.getElementById('manLW').value;
            if(hwTime && lwTime) { document.getElementById('setupTideChartContainer').style.display = 'block'; window.drawTideGraph('setupTideCanvas', hwTime, lwTime, [], ''); }
        };

        window.drawTideGraph = function(canvasId, hwStr, lwStr, fishArray, startStr) {
            try {
                const canvas = document.getElementById(canvasId); const ctx = canvas.getContext('2d'); const scale = 3;
                canvas.width = 340 * scale; canvas.height = 150 * scale; ctx.scale(scale, scale);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 340, 150);
                ctx.beginPath(); ctx.strokeStyle = '#069494'; ctx.lineWidth = 3;
                for(let x=0; x<=340; x++) { let y = 75 - Math.cos((x/340)*Math.PI*2) * 50; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.stroke();
            } catch(e) {}
        };

        window.forceAppUpdate = function() {
            const icon = document.getElementById('refreshIcon'); const btn = document.getElementById('btnRefreshApp');
            if(icon) icon.classList.add('icon-spin'); 
            if(btn) btn.innerHTML = '<i class="bi bi-arrow-clockwise icon-spin me-1 text-primary"></i> Checking for updates...';
            if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.update())); }
            sessionStorage.setItem('showUpdateToast', 'true');
            setTimeout(() => { window.location.reload(); }, 1500);
        };

        window.startFishing = function() { 
            document.getElementById("competitionDate").value = new Date().toISOString().split('T')[0]; 
            currentAngler = "Christopher Francis McCreadie"; document.getElementById("anglerName").value = currentAngler;
            window.populateTideStations(); window.populateVenueDropdown(); PageManager.show('anglerRegistration'); 
        };

        window.registerAngler = function() {
            currentAngler = document.getElementById('anglerName').value.trim(); 
            currentVenue = document.getElementById('venueSelect').value === '__NEW__' ? document.getElementById('venueInputText').value : document.getElementById('venueSelect').value;
            currentScoringMethod = document.getElementById('scoringMethod').value;
            if(!currentAngler) return window.showAppToast("Enter Name", true);
            window.setupFishingUI(); window.populateSpeciesDropdown(); PageManager.show('anglerFishingPage');
        };

        window.setupFishingUI = function() {
            document.getElementById('weightPickerContainer').style.display = currentScoringMethod === 'weight' ? 'block' : 'none'; 
            document.getElementById('lengthInputContainer').style.display = currentScoringMethod.includes('length') || currentScoringMethod === 'measure_points' ? 'block' : 'none';
            if(currentScoringMethod === 'weight') initWeightPicker();
        };

        function initWeightPicker() {
            const c1 = document.getElementById('pickerCol1'), c2 = document.getElementById('pickerCol2');
            let h1 = '', h2 = ''; for(let i=0;i<=50;i++) h1+=`<div class="picker-item" data-val="${i}">${i}</div>`;
            for(let i=0;i<=950;i+=50) h2+=`<div class="picker-item" data-val="${i/1000}">${(i/1000).toFixed(3).split('.')[1]}</div>`;
            c1.innerHTML=h1; c2.innerHTML=h2;
        }

        window.updatePickerDisplay = id => {
            const el = document.getElementById(id); const mid = el.scrollTop + 70;
            el.querySelectorAll('.picker-item').forEach(it => { if(it.offsetTop <= mid && it.offsetTop+50 >= mid) it.classList.add('selected'); else it.classList.remove('selected'); });
        };

        window.addFishTextOnly = function() {
            const sp = document.getElementById('speciesInput').value === "Other" ? document.getElementById('customSpeciesInput').value : document.getElementById('speciesInput').value;
            if(!sp) return;
            let val = (currentScoringMethod === 'weight') ? (parseFloat(document.querySelector('#pickerCol1 .selected')?.dataset.val || 0) + parseFloat(document.querySelector('#pickerCol2 .selected')?.dataset.val || 0)).toFixed(3) + 'kg' : document.getElementById('fishLengthInput').value + 'cm';
            fishData.push({ species: sp, display: val, time: new Date().toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'}) });
            window.updateFishLog();
        };

        window.updateFishLog = function() {
            const log = document.getElementById('fishLog'); log.innerHTML = '';
            fishData.slice().reverse().forEach((f, i) => {
                log.innerHTML += `<div class="inner-card p-3 d-flex justify-content-between align-items-center"><div><div class="fw-bold">${f.species} <small class="text-muted">${f.time}</small></div><div class="text-primary fw-bold">${f.display}</div></div><button class="btn btn-sm btn-outline-danger" onclick="window.delFish(${fishData.length-1-i})"><i class="bi bi-trash"></i></button></div>`;
            });
            document.getElementById('liveScoreVal').textContent = fishData.length;
        };

        window.delFish = i => { fishData.splice(i, 1); window.updateFishLog(); };

        window.endSession = function() {
            PageManager.show('tallyVerificationPage');
            document.getElementById('session_angler').textContent = currentAngler; document.getElementById('session_venue').textContent = currentVenue;
            document.getElementById('session_total_fish').textContent = fishData.length; document.getElementById('session_total_points').textContent = fishData.length;
            const shield = document.getElementById('session_xc_shield');
            shield.innerHTML = `<div class="xc-subtitle">Performance Index</div><div class="xc-score">6.5</div><div class="xc-story">Evaluation logic intact.</div>`;
            shield.style.display = 'block';
        };

        window.resetAppToHome = function() { fishData = []; PageManager.show('splashScreen'); };
        window.confirmQuit = function() { if(confirm("Discard?")) window.resetAppToHome(); };
        
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('service-worker.js'); }
            if(sessionStorage.getItem('showUpdateToast')) { sessionStorage.removeItem('showUpdateToast'); window.showAppToast("App Updated!"); }
            window.resetAppToHome();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
